dataset_version: phase2_pilot_v1
strategy_id: recursive
split: test
chunks_dir: experiments/data/chunks/recursive
index_dir: experiments/indexes/chroma/recursive/halong-embedding
collection_name: emb-recursive-contextboxai-halong-embedding
query_path: experiments/data/processed/test.jsonl
qrels_path: experiments/data/processed/qrels_recursive.jsonl
run_root: experiments/runs/hybrid
registry_path: experiments/runs/registry.jsonl
top_k: 40
retrieval_backend: hybrid_0_5_0_5
hybrid_weights: [0.5, 0.5]
metrics:
  recall_at: [10, 40]
  mrr_at: [10]
  ndcg_at: [10]
  hit_at: [5, 40]
  aliases:
    candidate_hit@40: hit@40
    candidate_recall@40: recall@40
    final_hit@5: hit@5
    final_recall@10: recall@10
model:
  name: contextboxai/halong_embedding
  batch_size: 16
  normalize_embeddings: true
