dataset_version: phase2_pilot_v1
strategy_id: timestamp_90_30
split: test
chunks_dir: experiments/data/chunks/timestamp_90_30
index_dir: experiments/indexes/chroma/timestamp_90_30/bge-m3
collection_name: idx-timestamp-90-30-bge-m3
query_path: experiments/data/ground_truth/ground_truth_pilot.jsonl
qrels_path: experiments/data/processed/qrels_timestamp_90_30.jsonl
run_root: experiments/runs/hybrid
registry_path: experiments/runs/registry.jsonl
top_k: 40
retrieval_backend: hybrid_0_5_0_5
hybrid_weights: [0.5, 0.5]
metrics:
  recall_at: [10, 40]
  mrr_at: [10]
  ndcg_at: [10]
  hit_at: [5, 40]
  aliases:
    candidate_hit@40: hit@40
    candidate_recall@40: recall@40
    final_hit@5: hit@5
    final_recall@10: recall@10
model:
  name: BAAI/bge-m3
  batch_size: 16
  normalize_embeddings: true
