dataset_version: phase4_parent_child_v1
strategy_id: parent_child_180s_45s
split: test
chunks_dir: experiments/data/chunks/parent_child_180s_45s
query_path: experiments/data/ground_truth/ground_truth_pilot.jsonl
qrels_path: experiments/data/processed/qrels_parent_child_180s_45s_child.jsonl
run_root: experiments/runs/reranker
registry_path: experiments/runs/registry.jsonl
candidate_top_n: 40
index_dir: experiments/indexes/chroma/parent_child_180s_45s/bge-m3-child
collection_name: idx-parent-child-180s-45s-bge-m3-child
device: auto
retriever:
  embedding_model: BAAI/bge-m3
  batch_size: 16
  normalize_embeddings: true
  retrieval_backend: chroma
latency_gates:
  demo_target_p95_ms: 800
  demo_hard_cap_p95_ms: 1500
lanes:
  smoke:
    candidate_pool_sizes: [10]
    max_length: 512
  offline_quality:
    candidate_pool_sizes: [40]
    max_length: 1024
metrics:
  recall_at: [1, 5, 10, 20, 40]
  mrr_at: [10]
  ndcg_at: [5, 10]
  precision_at: [1]
  map_at: [10]
models:
  - name: no_rerank
    type: baseline
    enabled: true
    lanes: [smoke, offline_quality]
  - name: BAAI/bge-reranker-base
    type: sentence_transformers_cross_encoder
    enabled: true
    lanes: [offline_quality]
    batch_size: 8
  - name: BAAI/bge-reranker-v2-m3
    type: sentence_transformers_cross_encoder
    enabled: true
    lanes: [offline_quality]
    batch_size: 4
